<!DOCTYPE html>
<html>
<head>
  <title>Redefinir senha</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0B5E2B;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      color: #0B5E2B;
      margin-bottom: 10px;
    }

    .hidden {
      display: none;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #0B5E2B;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #999;
    }

    .msg {
      margin-top: 15px;
      font-size: 14px;
    }

    .error { color: red; }
    .success { color: green; }
  </style>
</head>

<body>

  <div class="container">
    <h2>Redefinir senha!</h2>

    <p id="status">Verificando link...</p>

    <div id="form" class="hidden">
      <input type="password" id="password" placeholder="Nova senha" />
      <input type="password" id="confirm" placeholder="Confirmar senha" />

      <button onclick="updatePassword()" id="btn">
        Atualizar senha
      </button>
    </div>

    <p id="msg" class="msg"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseClient = supabase.createClient(
      'https://vppzpfoqmhjsynusyitx.supabase.co',
      'sb_publishable_T7AEj7zSK62iKDYQTWeIeQ_NM8hbY15'
    );

    const status = document.getElementById('status');
    const form = document.getElementById('form');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');

    let isProcessing = false;

    /* ================= CHECK SESSION ================= */

    async function checkSession() {
      try {
        const { data } = await supabaseClient.auth.getSession();

        if (!data.session) {
          status.innerText = 'Link inválido ou expirado.';
          msg.innerText = 'Solicite uma nova recuperação de senha.';
          msg.className = 'msg error';
          return;
        }

        status.innerText = 'Digite sua nova senha';
        form.classList.remove('hidden');

      } catch {
        status.innerText = 'Erro ao validar sessão.';
        msg.innerText = 'Tente novamente mais tarde.';
        msg.className = 'msg error';
      }
    }

    /* ================= VALIDAR SENHA ================= */

    function validarSenha(password) {
      const temNumero = /\d/.test(password);
      const temLetra = /[a-zA-Z]/.test(password);
      const temEspecial = /[!@#$%^&*(),.?":{}|<>]/.test(password);

      if (password.length < 8) {
        return 'Mínimo de 8 caracteres';
      }

      if (!temNumero || !temLetra || !temEspecial) {
        return 'Use letras, números e caractere especial';
      }

      return null;
    }

    /* ================= UPDATE PASSWORD ================= */

    async function updatePassword() {

      if (isProcessing) return;
      isProcessing = true;

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      msg.innerText = '';

      if (!password || !confirm) {
        showError('Preencha todos os campos');
        return resetButton();
      }

      const erroSenha = validarSenha(password);

      if (erroSenha) {
        showError(erroSenha);
        return resetButton();
      }

      if (password !== confirm) {
        showError('As senhas não coincidem');
        return resetButton();
      }

      btn.disabled = true;
      btn.innerText = 'Atualizando...';

      try {

        const { error } = await supabaseClient.auth.updateUser({
          password: password
        });

        if (error) {
          showError(error.message || 'Erro ao atualizar senha');
          return resetButton();
        }

        msg.innerText = 'Senha atualizada com sucesso!';
        msg.className = 'msg success';
        btn.innerText = 'Concluído';

        // 🔥 invalida sessão de reset
        await supabaseClient.auth.signOut();

        // 🔥 redireciona (opcional)
        setTimeout(() => {
          window.location.href = '/'; // ou página de login
        }, 2000);

      } catch {
        showError('Erro inesperado. Tente novamente.');
        resetButton();
      }
    }

    /* ================= HELPERS ================= */

    function showError(text) {
      msg.innerText = text;
      msg.className = 'msg error';
    }

    function resetButton() {
      btn.disabled = false;
      btn.innerText = 'Atualizar senha';
      isProcessing = false;
    }

    /* ================= INIT ================= */

    checkSession();
  </script>

</body>
</html>
