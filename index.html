<!DOCTYPE html>
<html>
<head>
  <title>Redefinir senha</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0B5E2B;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }

    h2 {
      color: #0B5E2B;
    }

    .hidden {
      display: none;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
      font-size: 16px;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #0B5E2B;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      background: #999;
    }

    .msg {
      margin-top: 15px;
      font-size: 14px;
    }

    .error { color: red; }
    .success { color: green; }
  </style>
</head>

<body>

  <div class="container">
    <h2>Redefinir senha</h2>

    <p id="status">Verificando link...</p>

    <div id="form" class="hidden">
      <input type="password" id="password" placeholder="Nova senha" />
      <input type="password" id="confirm" placeholder="Confirmar senha" />

      <button onclick="updatePassword()" id="btn">
        Atualizar senha
      </button>
    </div>

    <p id="msg" class="msg"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script>
    const supabaseClient = supabase.createClient(
      'https://vppzpfoqmhjsynusyitx.supabase.co',
      'sb_publishable_T7AEj7zSK62iKDYQTWeIeQ_NM8hbY15'
    );

    const status = document.getElementById('status');
    const form = document.getElementById('form');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');

    let isProcessing = false;

    /* ================= CHECK SESSION ================= */

    async function checkSession() {
      const { data } = await supabaseClient.auth.getSession();

      if (!data.session) {
        status.innerText = 'Link inválido ou expirado.';
        msg.innerText = 'Solicite uma nova recuperação.';
        msg.className = 'msg error';
        return;
      }

      status.innerText = 'Digite sua nova senha';
      form.classList.remove('hidden');
    }

    /* ================= VALIDAR SENHA ================= */

    function validarSenha(password) {
      const temNumero = /\d/.test(password);
      const temLetra = /[a-zA-Z]/.test(password);

      if (password.length < 6) {
        return 'Mínimo de 6 caracteres';
      }

      if (!temNumero || !temLetra) {
        return 'Use letras e números';
      }

      return null;
    }

    /* ================= UPDATE ================= */

    async function updatePassword() {

      if (isProcessing) return;
      isProcessing = true;

      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;

      msg.innerText = '';

      if (!password || !confirm) {
        msg.innerText = 'Preencha todos os campos';
        msg.className = 'msg error';
        isProcessing = false;
        return;
      }

      const erroSenha = validarSenha(password);

      if (erroSenha) {
        msg.innerText = erroSenha;
        msg.className = 'msg error';
        isProcessing = false;
        return;
      }

      if (password !== confirm) {
        msg.innerText = 'As senhas não coincidem';
        msg.className = 'msg error';
        isProcessing = false;
        return;
      }

      btn.disabled = true;
      btn.innerText = 'Atualizando...';

      const { error } = await supabaseClient.auth.updateUser({
        password: password
      });

      if (error) {
        msg.innerText = error.message;
        msg.className = 'msg error';
        btn.disabled = false;
        btn.innerText = 'Atualizar senha';
        isProcessing = false;
      } else {
        msg.innerText = 'Senha atualizada com sucesso!';
        msg.className = 'msg success';
        btn.innerText = 'Concluído';
      }
    }

    checkSession();
  </script>

</body>
</html>
